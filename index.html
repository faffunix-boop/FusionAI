<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        #chat-box { border: 1px solid #ccc; height: 300px; padding: 10px; overflow-y: scroll; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h3>AI Chat</h3>
    <div id="chat-box"></div>
    <input type="text" id="userInput" placeholder="Tanya sesuatu...">
    <button onclick="sendMessage()">Hantar</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const question = input.value;
            
            chatBox.innerHTML += `<p><b>Anda:</b> ${question}</p>`;
            input.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await response.json();
            chatBox.innerHTML += `<p><b>AI:</b> ${data.answer}</p>`;
        }
    </script>
</body>
</html>
